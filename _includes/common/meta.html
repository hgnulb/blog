<meta charset="utf-8">
<!--[if IE]>
<meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'>
<![endif]-->
<meta content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" name="viewport">
<meta content="{% if site.author.name %}{{ site.author.name }},{% endif %}{% if page.tags != null %}{{ page.tags | join: ',' }}{% else %}{{ site.keywords }}{% endif %}" name="keywords"/>
{% if page.url == "/404.html" %}
<meta content="15; url={{ site.paths.blog | relative_url }}" http-equiv="refresh">
{% endif %}
{% if page.indexing == false %}
<meta content="noindex" name="robots">
{% endif %}{% seo %}
{% include helpers/path_prefix %}
<link href="{{ '/assets/images/theme/favicon.svg' | prepend: path_prefix }}" rel="shortcut icon" type="image/x-icon">
<link href="{{ '/assets/images/theme/favicon.svg' | prepend: path_prefix }}" rel="icon" type="image/x-icon">
